# ============================================================
# Wasteland Hex Crawl — Item Registry
# ============================================================
# Edit freely. Reboot ESP32 to reload. No firmware flash needed.
#
# Keys (all optional — missing keys default to 0/false/none):
#   id        = unique item ID (1-254; 0 reserved for empty slot)
#   name      = display name (max 15 chars)
#   category  = consumable | equipment | material | key
#   slot      = none | head | body | hand | feet | vehicle
#   stack     = max quantity per inventory slot (default 1)
#   trade     = yes | no  (key items: no)
#   value     = scrap-equivalent trade value
#   ll        = Life Level delta (signed)
#   food      = Food track delta (signed)
#   water     = Water track delta (signed)
#   fatigue   = Fatigue track delta (signed)
#   rad       = Radiation track delta (signed)
#   resolve   = Resolve delta (signed)
#   mp        = Movement Point bonus (signed; for equipped items applied at dawn)
#   slots     = Inventory slot bonus (signed; for equipped items)
#   water_cost = water tokens consumed at dawn (for equipped items with daily cost)
#   food_cost  = food tokens consumed at dawn
#   fuel_cost  = fuel tokens consumed at dawn
#   med_cost   = medicine tokens consumed at dawn
#   scrap_cost = scrap tokens consumed at dawn
#   terrain   = bitmask of terrain types unlocked while equipped
#               bit0 = River Channel (terrain 11) — raft/wetsuit
#               (other bits reserved for future terrain types)
#   effect    = none | unlock_action | reveal_fog | narrative | threat_mod | cure_status
#   param     = effect parameter (action ID, fog radius, narrative ID, threat delta, status bitmask)
#   effect2   = second effect (same values as effect)
#   param2    = second effect parameter
#
